<div class="list-container">
  <div class="list-header">
    <div>
      <h2 class="page-title">Items</h2>
    </div>
    <button mat-raised-button color="primary" [routerLink]="['/items/new']">
      <mat-icon>add</mat-icon>
      New Item
    </button>
  </div>

  <mat-form-field appearance="outline" class="filter-field">
    <mat-label>Search items…</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Filter by name or description…" />
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <div class="table-wrapper mat-elevation-z2">
    @if (isLoading()) {
      <div class="loading-overlay">
        <mat-progress-spinner mode="indeterminate" diameter="48" />
      </div>
    }

    <table mat-table [dataSource]="dataSource" matSort class="items-table">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>#</th>
        <td mat-cell *matCellDef="let item">{{ item.id }}</td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
        <td mat-cell *matCellDef="let item" class="title-cell">{{ item.name }}</td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let item" class="body-cell">{{ item.description }}</td>
      </ng-container>

      <ng-container matColumnDef="created_at">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Created</th>
        <td mat-cell *matCellDef="let item">{{ item.created_at | date:'d. M. yyyy' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let item">
          <button
            mat-icon-button
            color="primary"
            [routerLink]="['/items', item.id, 'edit']"
            matTooltip="Edit item"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button
            mat-icon-button
            color="warn"
            (click)="deleteItem(item.id, $event)"
            matTooltip="Delete item"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns;"
        [routerLink]="['/items', row.id, 'edit']"
        class="clickable-row"
      ></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data-cell" [attr.colspan]="displayedColumns.length">
          @if (!isLoading()) {
            No items found
            @if (dataSource.filter) {
              matching "<em>{{ dataSource.filter }}</em>"
            }
          }
        </td>
      </tr>
    </table>
    <mat-paginator
      [pageSizeOptions]="[10, 25, 50, 100]"
      [pageSize]="10"
      showFirstLastButtons
    />
  </div>
</div>
