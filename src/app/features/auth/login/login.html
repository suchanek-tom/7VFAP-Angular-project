<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <div class="card-logo">
        <mat-icon>lock_person</mat-icon>
      </div>
      <mat-card-title>Sign In</mat-card-title>
      <mat-card-subtitle>Enter your credentials to continue</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" placeholder="email*" autocomplete="email" />
          <mat-icon matSuffix>email</mat-icon>
          @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
            <mat-error>{{ getFieldError('email') }}</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input
            matInput
            formControlName="password"
            [type]="hidePassword() ? 'password' : 'text'"
            autocomplete="current-password"
          />
          <button type="button" mat-icon-button matSuffix (click)="hidePassword.set(!hidePassword())">
            <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
            <mat-error>{{ getFieldError('password') }}</mat-error>
          }
        </mat-form-field>
        <button
          mat-raised-button
          color="primary"
          type="submit"
          class="full-width login-btn"
          [disabled]="isLoading()"
        >
          @if (isLoading()) {
            <mat-progress-spinner diameter="20" mode="indeterminate" />
          } @else {
            Sign In
          }
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
